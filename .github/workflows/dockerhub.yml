  # ─── Merge: decidim-test manifest ──────────────────────────────────
  merge-test:
    needs: [prepare, build-test]
    runs-on: ubuntu-latest
    steps:
    - name: Download Docker Hub digests
      uses: actions/download-artifact@v4
