name: decidim-hello-world
services:
  decidim:
    image: decidim/decidim:latest
    entrypoint: ["/code/vendor/hello-world.sh"]
    # The entrypoint override above wipes out the CMD 
    # on the Dockerfile-deploy, so we need to declare it 
    # again here (https://github.com/docker/compose/issues/3140)
    command: ["bundle", "exec", "rails", "s", "-b", "0.0.0.0"]
    ports:
      - 3000:3000
    volumes:
      # Makes our entrypoint scripts available to the container
      # under /code/vendor
      - ./scripts:/code/vendor
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - RAILS_ENV=development
      - DATABASE_HOST=postgres
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
    links:
      - postgres
      - redis

  postgres:
    image: postgres:16.1
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    volumes:
      - redis-data:/data
volumes:
  postgres-data: {}
  redis-data: {}
